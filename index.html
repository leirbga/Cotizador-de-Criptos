<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Cotizador</title>
</head>
<body>
    <div class="superContenedor">
    <div class="crypto-loader">
    <div class="coin">₿</div>
    <h1 class="titulo dinero">Cotizador de Cryptos</h1>
    </div>
    <div id="contenedorPrincipal">
            <form id="cotizador">
                <div class="dinero">
                    <label class="titulo">Elige Tu Moneda</label>
                     <div>
                    <select id="selectorMoneda">
                        <option selected disabled value="">Selecciona una moneda</option>
                        <option value="USD">USD</option>
                        <option value="VES">Bolivares</option>
                        <option value="AUD">Dorales Australianos</option>
                        <option value="MXN">Pesos Mexicanos</option>
                    </select>
                </div>
                </div>
            <div class="dinero">
                <label class="titulo">Elige Tu Criptomoneda</label>
                
                <div>
                <select  id="selectorCripto">
                    <option selected disabled value="">Selecciona una Criptomoneda</option>
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Ethereum</option>
                    <option value="BNC">Binance Coin</option>
                </select>
                 </div>
             </div>

            <div class="dinero">
                <label class="titulo">Monto</label>
                    <div>
                        <input id="Monto" type="number" placeholder="Ingrese un monto a cotizar">
                     </div>
            </div>
            <button id="cotizar" class="usuarioInput">cotizar</button>
            <div id="informacion"></div>
            </form>
           </div>
</div>

<footer class="pieDePagina"><p>Elaborado por <a href="https://github.com/leirbga">Jose Oviedo 📌</a> </p></footer>

<script src="scritp.js"></script>
</body>
</html>
